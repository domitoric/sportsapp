spring.application.name=sportsapp
spring.datasource.url=jdbc:postgresql://localhost:5432/sportsapp?options=-c%20TimeZone=UTC
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.thymeleaf.cache=false
spring.sql.init.mode=always

football.api.base-url=https://api.football-data.org/v4/
football.api.token=${FOOTBALL_API_TOKEN:${FOOTBALL_DATA_API_TOKEN:}}
football.api.season=2025

app.bootstrap.username=legacy
app.bootstrap.password=legacy12345
