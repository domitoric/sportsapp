<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        :root {
            --bg: #f4efe6;
            --panel: #fffaf2;
            --accent: #0d5c63;
            --text: #1e2a2f;
            --muted: #617379;
            --border: #d4ccc0;
            --danger: #9b2226;
        }
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; font-family: Georgia, "Times New Roman", serif; background: radial-gradient(circle at top, #fffdf8, var(--bg)); color: var(--text); }
        .panel { width: min(420px, 100%); background: var(--panel); border: 1px solid var(--border); border-radius: 18px; padding: 28px; box-shadow: 0 10px 30px rgba(30, 42, 47, 0.08); }
        h1 { margin: 0 0 12px; }
        p { margin: 0 0 18px; color: var(--muted); }
        label { display: block; margin-bottom: 6px; font-size: 14px; }
        input { width: 100%; padding: 10px 12px; margin-bottom: 6px; border-radius: 10px; border: 1px solid #cbbfb1; font: inherit; }
        .field-error { min-height: 20px; margin-bottom: 10px; color: var(--danger); font-size: 13px; }
        button { width: 100%; min-height: 44px; padding: 10px 18px; border-radius: 999px; border: 1px solid var(--accent); background: white; color: var(--accent); font: inherit; font-weight: 700; cursor: pointer; }
        a { color: var(--accent); font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>
<section class="panel">
    <h1>Create Account</h1>
    <p>Your tracked teams, players and matches will be stored separately for this login.</p>
    <form method="post" action="/register" th:object="${registrationRequest}">
        <label for="username">Login</label>
        <input id="username" th:field="*{username}" type="text" autocomplete="username" required>
        <div class="field-error" th:errors="*{username}"></div>
        <label for="password">Password</label>
        <input id="password" th:field="*{password}" type="password" autocomplete="new-password" required>
        <div class="field-error" th:errors="*{password}"></div>
        <button type="submit">Register</button>
    </form>
    <p style="margin-top:16px;">Already have an account? <a href="/login">Login</a></p>
</section>
</body>
</html>
