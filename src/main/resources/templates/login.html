<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        :root {
            --bg: #f4efe6;
            --panel: #fffaf2;
            --accent: #0d5c63;
            --text: #1e2a2f;
            --muted: #617379;
            --border: #d4ccc0;
            --danger: #9b2226;
        }
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; font-family: Georgia, "Times New Roman", serif; background: radial-gradient(circle at top, #fffdf8, var(--bg)); color: var(--text); }
        .panel { width: min(420px, 100%); background: var(--panel); border: 1px solid var(--border); border-radius: 18px; padding: 28px; box-shadow: 0 10px 30px rgba(30, 42, 47, 0.08); }
        h1 { margin: 0 0 12px; }
        p { margin: 0 0 18px; color: var(--muted); }
        label { display: block; margin-bottom: 6px; font-size: 14px; }
        input { width: 100%; padding: 10px 12px; margin-bottom: 14px; border-radius: 10px; border: 1px solid #cbbfb1; font: inherit; }
        button { width: 100%; min-height: 44px; padding: 10px 18px; border-radius: 999px; border: 1px solid var(--accent); background: white; color: var(--accent); font: inherit; font-weight: 700; cursor: pointer; }
        .message { margin-bottom: 14px; font-size: 14px; }
        .error { color: var(--danger); }
        .ok { color: var(--accent); }
        a { color: var(--accent); font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>
<section class="panel">
    <h1>Sports Tracker</h1>
    <p>Login and password only. Password recovery is not available.</p>
    <p class="message error" th:if="${loginError}">Invalid login or password.</p>
    <p class="message ok" th:if="${registered}">Registration completed. You can login now.</p>
    <p class="message ok" th:if="${loggedOut}">Session closed.</p>
    <form method="post" action="/login">
        <label for="username">Login</label>
        <input id="username" name="username" type="text" autocomplete="username" required>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
        <button type="submit">Login</button>
    </form>
    <p style="margin-top:16px;">No account yet? <a href="/register">Create one</a></p>
</section>
</body>
</html>
